name: CI

on:
  push:
    branches: [main, dev, dev-server]
  pull_request:
    branches: [main, dev, dev-server]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
      - name: Build backend
        run: |
          cd Backend
          chmod +x gradlew
          ./gradlew --no-daemon bootJar
      - name: Verify backend Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false
          tags: ang-backend-ci:latest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        run: |
          cd Frontend
          npm install
          npm run build
      - name: Verify frontend Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: false
          tags: ang-frontend-ci:latest

  ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install AI dependencies
        run: |
          cd AI
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Verify AI Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: ./AI
          file: ./AI/Dockerfile
          push: false
          tags: ang-ai-ci:latest
