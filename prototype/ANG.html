<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANG 통합 메인 대시보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0284A8',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fade-in { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-in { animation: fade-in 0.5s ease-out forwards; }

        .tab-active {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #0284A8;
            font-weight: 900;
            z-index: 10;
        }
        .tab-inactive {
            color: #64748b;
        }
        .tab-inactive:hover {
            background-color: #f1f5f9;
        }

        /* Sidebar & Container transitions */
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #main-container { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 h-screen flex flex-col overflow-x-hidden">

    <!-- 1. Header (교수님/교직원용으로 더 크고 직관적인 헤더) -->
    <header class="h-24 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="text-primary font-black text-4xl tracking-tighter italic leading-none">ANG</div>
            <div class="hidden md:block text-xs font-black text-slate-400 border-l-2 border-slate-100 pl-4 leading-tight uppercase tracking-widest">
                AI Network<br/>Group Portal
            </div>
        </div>

        <div class="flex items-center gap-10">
            <!-- Global Search -->
            <div class="hidden lg:flex relative group w-80">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" style="width: 18px; height: 18px;"></i>
                <input type="text" placeholder="통합 검색 (메뉴, 문서, 사람)" class="w-full bg-slate-50 border-2 border-slate-100 focus:bg-white focus:border-primary rounded-xl py-2.5 pl-12 pr-4 text-sm outline-none transition-all">
            </div>

            <div class="flex items-center gap-6">
                <button class="text-slate-400 hover:text-primary transition-all relative p-2">
                    <i data-lucide="bell" style="width: 24px; height: 24px;"></i>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                
                <!-- Profile & Quick Action Widget (네이버 스타일 + 강화된 버튼) -->
                <div class="flex items-center gap-4 pl-6 border-l-2 border-slate-100">
                    <div class="flex items-center gap-5 bg-slate-50/80 p-3 rounded-2xl border border-slate-200 shadow-sm">
                        <div class="w-14 h-14 rounded-full bg-white border-2 border-slate-200 flex items-center justify-center text-primary shadow-sm hover:border-primary transition-colors cursor-pointer">
                            <i data-lucide="user" style="width: 32px; height: 32px;"></i>
                        </div>
                        <div class="flex flex-col min-w-[140px]">
                            <div class="flex items-center justify-between">
                                <span class="text-sm font-black text-slate-800 tracking-tight">차무식 팀장</span>
                                <i data-lucide="chevron-down" style="width: 14px; height: 14px;" class="text-slate-400"></i>
                            </div>
                            <div class="flex items-center gap-2 mt-2">
                                <button class="flex-1 bg-primary text-white text-[11px] font-black flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg shadow-md shadow-primary/20 hover:brightness-110 transition-all">
                                    <i data-lucide="mail" style="width: 12px; height: 12px;"></i> 메일
                                </button>
                                <button class="flex-1 bg-primary text-white text-[11px] font-black flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg shadow-md shadow-primary/20 hover:brightness-110 transition-all">
                                    <i data-lucide="message-square" style="width: 12px; height: 12px;"></i> 채팅
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- 2. Sidebar -->
        <aside id="sidebar" class="bg-primary flex flex-col py-6 px-2 z-50 shadow-2xl fixed top-24 bottom-0 left-0 w-56">
            <div class="mb-8 flex items-center px-4">
                <button id="sidebar-toggle" onclick="toggleSidebar()" class="text-white hover:bg-white/10 p-2 rounded-xl transition-all flex items-center justify-center">
                    <i id="toggle-icon" data-lucide="chevron-left" style="width: 24px; height: 24px;"></i>
                </button>
                <span id="sidebar-title" class="text-[11px] font-black text-white uppercase tracking-[0.2em] ml-4 overflow-hidden whitespace-nowrap transition-opacity duration-300 opacity-60">Portal Menu</span>
            </div>

            <nav class="flex-1 space-y-2 px-1" id="sidebar-nav">
                <!-- Items generated by JS -->
            </nav>
            
            <!-- Bottom Setting Area -->
            <div id="sidebar-bottom" class="mt-auto px-1 pb-6">
                <!-- Settings button generated by JS -->
            </div>
        </aside>

        <!-- 3. Main Content Container -->
        <div id="main-container" class="flex-1 flex flex-col relative ml-56 overflow-hidden transition-all duration-300">
            
            <!-- Browser Tabs -->
            <div class="bg-white border-b border-slate-200 h-12 flex items-end px-6 z-30">
                <div id="tab-list" class="flex items-center gap-1 overflow-x-auto no-scrollbar max-w-full">
                    <!-- Tabs generated by JS -->
                </div>
            </div>

            <!-- Content Area (Scrollable for deeper content) -->
            <main id="content-area" class="flex-1 overflow-y-auto p-10 lg:p-14 bg-slate-50/30">
                <!-- Dynamic content -->
            </main>
        </div>
    </div>

    <script>
        // State
        let isSidebarOpen = true;
        let activeTabId = 'dashboard';
        let openTabs = [
            { id: 'dashboard', title: '대시보드' },
            { id: 'approval', title: '전자 결재' },
            { id: 'calendar_page', title: '캘린더' }
        ];

        const menuItems = [
            { id: 'approval', title: '전자 결재', icon: 'file-check' },
            { id: 'calendar_page', title: '캘린더', icon: 'calendar' },
            { id: 'files', title: '파일함', icon: 'folder-open' },
            { id: 'boards', title: '게시판', icon: 'layout-grid' },
            { id: 'org', title: '조직도', icon: 'network' },
            { id: 'ai_docs', title: 'AI 문서', icon: 'bot' },
        ];

        // Toggle Function
        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const mainContainer = document.getElementById('main-container');
            const toggleIcon = document.getElementById('toggle-icon');
            const sidebarTitle = document.getElementById('sidebar-title');

            if (isSidebarOpen) {
                sidebar.style.width = '14rem'; 
                mainContainer.style.marginLeft = '14rem';
                toggleIcon.setAttribute('data-lucide', 'chevron-left');
                sidebarTitle.style.opacity = '0.6';
                setTimeout(() => sidebarTitle.classList.remove('hidden'), 50);
            } else {
                sidebar.style.width = '4.5rem'; 
                mainContainer.style.marginLeft = '4.5rem';
                toggleIcon.setAttribute('data-lucide', 'menu');
                sidebarTitle.style.opacity = '0';
                setTimeout(() => sidebarTitle.classList.add('hidden'), 300);
            }
            
            updateUI();
        }

        function handleMenuClick(id, title) {
            if (!openTabs.find(tab => tab.id === id)) {
                openTabs.push({ id, title });
            }
            activeTabId = id;
            updateUI();
        }

        function closeTab(e, id) {
            e.stopPropagation();
            if (id === 'dashboard') return;
            openTabs = openTabs.filter(tab => tab.id !== id);
            if (activeTabId === id) {
                activeTabId = openTabs[openTabs.length - 1].id;
            }
            updateUI();
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            let html = `
                <button onclick="handleMenuClick('dashboard', '대시보드')" class="w-full flex items-center px-4 py-4 rounded-2xl transition-all ${activeTabId === 'dashboard' ? 'bg-white text-primary shadow-xl font-black scale-105' : 'text-white/70 hover:bg-white/10 hover:text-white font-bold'}">
                    <div class="w-8 flex justify-center"><i data-lucide="home" style="width: 22px; height: 22px;"></i></div>
                    ${isSidebarOpen ? '<span class="text-[13px] ml-5 whitespace-nowrap">메인 대시보드</span>' : ''}
                </button>
                <div class="h-px bg-white/10 my-6 mx-4"></div>
            `;

            menuItems.forEach(item => {
                html += `
                    <button onclick="handleMenuClick('${item.id}', '${item.title}')" class="w-full flex items-center px-4 py-4 rounded-2xl transition-all ${activeTabId === item.id ? 'bg-white text-primary shadow-xl font-black scale-105' : 'text-white/70 hover:bg-white/10 hover:text-white font-bold'}">
                        <div class="w-8 flex justify-center"><i data-lucide="${item.icon}" style="width: 22px; height: 22px;"></i></div>
                        ${isSidebarOpen ? `<span class="text-[13px] ml-5 whitespace-nowrap">${item.title}</span>` : ''}
                    </button>
                `;
            });
            nav.innerHTML = html;

            const bottom = document.getElementById('sidebar-bottom');
            bottom.innerHTML = `
                <button class="w-full flex items-center px-4 py-4 rounded-2xl text-white/50 hover:text-white hover:bg-white/10 transition-all font-bold">
                    <div class="w-8 flex justify-center"><i data-lucide="settings" style="width: 22px; height: 22px;"></i></div>
                    ${isSidebarOpen ? '<span class="text-[13px] ml-5 whitespace-nowrap">설정</span>' : ''}
                </button>
            `;
        }

        function renderTabs() {
            const list = document.getElementById('tab-list');
            list.innerHTML = openTabs.map(tab => `
                <div onclick="activeTabId = '${tab.id}'; updateUI();" class="h-10 px-6 min-w-[150px] flex items-center justify-between gap-4 cursor-pointer rounded-t-2xl transition-all group relative border-t border-x ${activeTabId === tab.id ? 'tab-active' : 'bg-white border-transparent text-slate-400 hover:bg-slate-50'}">
                    <div class="flex items-center gap-2 truncate text-[11px] font-bold uppercase tracking-widest">
                        ${tab.title}
                    </div>
                    ${tab.id !== 'dashboard' ? `<i onclick="closeTab(event, '${tab.id}')" data-lucide="x" style="width: 14px; height: 14px;" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"></i>` : ''}
                    ${activeTabId === tab.id ? '<div class="absolute -bottom-[1px] left-0 right-0 h-[2px] bg-slate-50 z-20"></div>' : ''}
                </div>
            `).join('');
        }

        function renderDashboardContent() {
            return `
                <div class="max-w-[1600px] mx-auto space-y-12 animate-in pb-20">
                    <!-- AI Assistant Section (교수님들을 위해 더 넓고 시각적인 여유 배치) -->
                    <section class="bg-white rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/40 overflow-hidden">
                        <div class="bg-white px-10 py-8 border-b border-slate-100 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="p-3 bg-blue-50 rounded-2xl text-primary">
                                    <i data-lucide="sparkles" style="width: 28px; height: 28px;"></i>
                                </div>
                                <div>
                                    <h2 class="text-xl font-black text-slate-800 tracking-tight leading-tight">ANG AI 업무 비서</h2>
                                    <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest mt-1">AI Document & Work Assistant</p>
                                </div>
                            </div>
                            <div class="flex gap-4 text-[12px] font-black">
                                <button class="px-6 py-2.5 rounded-xl border-2 bg-white border-primary text-primary shadow-sm hover:bg-primary hover:text-white transition-all">문서 작성</button>
                                <button class="px-6 py-2.5 rounded-xl border-2 border-transparent text-slate-400 hover:text-slate-600">문서 요약</button>
                                <button class="px-6 py-2.5 rounded-xl border-2 border-transparent text-slate-400 hover:text-slate-600">업무 추천</button>
                            </div>
                        </div>
                        <div class="p-10 grid grid-cols-1 lg:grid-cols-5 gap-16">
                            <div class="lg:col-span-3 space-y-6">
                                <div class="flex justify-between items-end px-2">
                                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest">명령을 입력해주세요</label>
                                    <button class="text-primary flex items-center gap-2 text-xs font-black"><i data-lucide="paperclip" style="width: 16px; height: 16px;"></i> 참고 파일 첨부</button>
                                </div>
                                <div class="relative bg-slate-50/80 rounded-[2.5rem] p-8 border-2 border-slate-100 focus-within:border-primary/30 transition-all">
                                    <textarea placeholder="교수님, 무엇을 도와드릴까요? (예: '중간고사 성적 공지문 초안 작성해줘')" class="w-full bg-transparent h-32 text-lg font-medium focus:outline-none resize-none placeholder:text-slate-300"></textarea>
                                    <div class="flex justify-end mt-4">
                                        <button class="bg-primary text-white px-8 py-4 rounded-3xl text-sm font-black flex items-center gap-3 shadow-2xl shadow-primary/30 hover:scale-105 active:scale-95 transition-all">
                                            <i data-lucide="sparkles" style="width: 20px; height: 20px;"></i> AI 비서 실행
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="lg:col-span-2 flex flex-col items-center justify-center border-l-2 border-dashed border-slate-100 px-12 text-center">
                                <div class="w-20 h-20 rounded-[2.5rem] bg-slate-100 flex items-center justify-center text-slate-400 mb-8 border-4 border-white shadow-inner">
                                    <i data-lucide="bot" style="width: 40px; height: 40px;"></i>
                                </div>
                                <p class="text-base font-bold text-slate-500 leading-relaxed">
                                    복잡한 문서 작업과 일정 관리,<br/>
                                    <span class="text-primary">인공지능 비서</span>가 교수님의 시간을 아껴드립니다.
                                </p>
                            </div>
                        </div>
                    </section>

                    <!-- Bottom Grid (여유로운 하단 위젯) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-8">
                        <!-- Calendar -->
                        <div class="bg-white rounded-[2.5rem] border border-slate-200 p-8 shadow-lg shadow-slate-100/50">
                            <div class="flex items-center justify-between mb-8">
                                <div class="flex items-center gap-2 text-primary font-black text-sm">
                                    <i data-lucide="chevron-left" style="width: 18px; height: 18px;" class="cursor-pointer"></i> 
                                    2026. 04 
                                    <i data-lucide="chevron-right" style="width: 18px; height: 18px;" class="cursor-pointer"></i>
                                </div>
                            </div>
                            <div class="grid grid-cols-7 mb-6 text-[10px] font-black text-slate-300 text-center uppercase tracking-widest">
                                <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
                            </div>
                            <div class="grid grid-cols-7 gap-2 text-center">
                                ${Array.from({length: 30}, (_, i) => `
                                    <div class="h-10 flex items-center justify-center relative cursor-pointer hover:bg-slate-50 rounded-xl transition-all">
                                        <span class="z-10 text-[13px] font-bold ${i+1 === 13 ? 'text-white' : 'text-slate-600'}">${i+1}</span>
                                        ${i+1 === 13 ? '<div class="absolute w-8 h-8 rounded-full bg-primary shadow-lg shadow-primary/40"></div>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Schedule -->
                        <div class="bg-white rounded-[2.5rem] border border-slate-200 p-8 shadow-lg shadow-slate-100/50">
                            <div class="flex items-center justify-between mb-8">
                                <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">Schedule</h3>
                                <div class="p-2 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all">
                                    <i data-lucide="plus" style="width: 18px; height: 18px;" class="text-slate-400"></i>
                                </div>
                            </div>
                            <div class="bg-slate-50/50 p-8 rounded-3xl text-sm text-slate-400 text-center italic flex flex-col items-center justify-center h-52 border border-slate-100">
                                <i data-lucide="calendar-range" class="opacity-10 mb-4" style="width: 48px; height: 48px;"></i>
                                오늘 일정이 없습니다.
                            </div>
                        </div>

                        <!-- AI Prediction -->
                        <div class="bg-white rounded-[2.5rem] border border-slate-200 p-8 shadow-lg shadow-slate-100/50 flex flex-col items-center justify-center text-center">
                            <div class="w-16 h-16 rounded-[2rem] bg-[#f0f9ff] flex items-center justify-center text-primary mb-6 shadow-sm border-2 border-white">
                                <i data-lucide="sparkles" style="width: 32px; height: 32px;"></i>
                            </div>
                            <h3 class="text-lg font-black text-slate-800 mb-2">업무 흐름 예측</h3>
                            <p class="text-xs text-slate-400 mb-8 font-bold tracking-tight leading-relaxed">4년간의 교직원 데이터를<br/>기반으로 분석한 결과입니다.</p>
                            <button class="w-full py-4 bg-slate-900 text-white rounded-[1.5rem] text-[12px] font-black shadow-xl hover:bg-black transition-all">전체 분석 보고서 확인</button>
                        </div>

                        <!-- Notices -->
                        <div class="bg-white rounded-[2.5rem] border border-slate-200 p-8 shadow-lg shadow-slate-100/50">
                            <h3 class="text-sm font-black text-slate-800 mb-8 uppercase tracking-widest">Notice</h3>
                            <div class="space-y-6">
                                <div class="flex flex-col gap-1 border-b border-slate-100 pb-4 cursor-pointer hover:bg-slate-50 rounded-lg p-2 transition-all">
                                    <div class="flex justify-between items-center">
                                        <span class="text-[13px] font-black text-slate-700 truncate">조직도 개편 안내</span>
                                        <span class="text-[10px] text-slate-300 font-bold">04.01</span>
                                    </div>
                                    <p class="text-[11px] text-slate-400">2026년 상반기 교직원 배치...</p>
                                </div>
                                <div class="flex flex-col gap-1 border-b border-slate-100 pb-4 cursor-pointer hover:bg-slate-50 rounded-lg p-2 transition-all">
                                    <div class="flex justify-between items-center">
                                        <span class="text-[13px] font-black text-slate-700 truncate">정기 점검 안내</span>
                                        <span class="text-[10px] text-slate-300 font-bold">03.28</span>
                                    </div>
                                    <p class="text-[11px] text-slate-400">네트워크 보안 패치 작업 예정...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateUI() {
            renderSidebar();
            renderTabs();
            
            const area = document.getElementById('content-area');
            if (activeTabId === 'dashboard') {
                area.innerHTML = renderDashboardContent();
            } else {
                const title = menuItems.find(m => m.id === activeTabId)?.title || "Unknown";
                const icon = menuItems.find(m => m.id === activeTabId)?.icon || "file";
                area.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-[70vh] text-slate-400 animate-in">
                        <div class="w-24 h-24 bg-slate-100 rounded-[2.5rem] flex items-center justify-center mb-6 text-slate-300 border-4 border-white shadow-xl">
                            <i data-lucide="${icon}" style="width: 48px; height: 48px;"></i>
                        </div>
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight">${title}</h2>
                        <p class="text-base font-medium mt-2 italic">교수님, 이 페이지는 현재 점검 중입니다.</p>
                        <button onclick="handleMenuClick('dashboard', '대시보드')" class="mt-10 px-8 py-3 bg-slate-900 text-white text-sm font-black rounded-2xl shadow-2xl hover:bg-black">대시보드 메인으로 이동</button>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = () => updateUI();
    </script>
</body>
</html>
