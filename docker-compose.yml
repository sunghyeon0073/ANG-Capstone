services:
  # 1. DB 서비스 추가 (이 부분이 없어서 안 떴던 것입니다)
  db:
    image: mariadb:latest
    container_name: ang-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MARIADB_DATABASE=ang_db
      - MARIADB_USER=${DB_USERNAME}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD} # root 비번도 동일하게 설정
    volumes:
      - ./mariadb_data:/var/lib/mysql

  # 2. 백엔드 설정 수정
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: ang-backend
    env_file:
      - .env
    ports:
      - "9090:9090"
    environment:
      # DB 주소를 로컬이 아닌 도커 내부의 'db' 서비스로 향하게 합니다.
      DB_URL: jdbc:mariadb://db:3306/ang_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:?ADMIN_INIT_PASSWORD is required}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://localhost:5173,http://localhost:5500,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5500,http://15.168.156.224:5500}
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR:-/app/uploads}
      AI_BASE_URL: ${AI_BASE_URL:-http://ai:8888}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-ang-ai:latest}
    depends_on:
      - db # DB가 먼저 떠야 백엔드가 실행됩니다.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads

  # 3. 프론트엔드
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: ang-frontend
    ports:
      - "5500:80"
    depends_on:
      - backend

  # 4. AI 서비스
  ai:
    build:
      context: ./AI
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: ang-ai
    ports:
      - "8888:8888"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-ang-ai:latest}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HOST: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads