    password: ${ADMIN_INIT_PASSWORD}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}
  timeout: 120

server:
  port: 9090
  servlet:
    context-path: /api

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: debug
