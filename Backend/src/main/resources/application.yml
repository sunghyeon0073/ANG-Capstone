spring:
  application:
    name: Ang

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

admin:
  init:
    password: ${ADMIN_INIT_PASSWORD}

cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:5500,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5500,http://15.168.156.224:5500}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

ai:
  base-url: ${AI_BASE_URL:http://localhost:8888}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:ang-ai:latest}
  timeout: 120

server:
  port: 9090
  servlet:
    context-path: /api

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: debug
